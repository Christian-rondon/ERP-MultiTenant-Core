packages:
  "framer-motion": "Animations and page transitions"
  "recharts": "Dashboard analytics charts and data visualization"
  "jspdf": "PDF report generation"
  "jspdf-autotable": "Table generation for PDF reports"
  "date-fns": "Date formatting and manipulation"
  "clsx": "Utility for conditionally joining classNames"
  "tailwind-merge": "Utility to merge tailwind classes safely"
  "@hookform/resolvers": "Zod validation resolver for forms"
  "react-hook-form": "Form state management"
  "zod": "Schema validation"
  "lucide-react": "Beautiful icons"

images:
  - path: "artifacts/erp-venezuela/public/images/login-bg.png"
    description: "Abstract geometric 3D dark mode background with deep indigo and subtle emerald light leaks, highly polished professional aesthetic"
    aspect_ratio: "16:9"
  - path: "artifacts/erp-venezuela/public/images/logo.png"
    description: "Minimalist modern geometric abstract logo mark in glowing electric blue on a pure transparent background"
    aspect_ratio: "1:1"

notes:
  - "Authentication assumes localStorage token storage and Authorization: Bearer header"
  - "TrialGate checks import.meta.env.VITE_TRIAL_END_DATE"
  - "Backend runs on /api"
