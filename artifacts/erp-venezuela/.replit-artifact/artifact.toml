kind = "web"
previewPath = "/"
title = "ERP Venezuela"
version = "1.0.0"
id = "artifacts/erp-venezuela"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22002

[services.development]
run = "pnpm --filter @workspace/erp-venezuela run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/erp-venezuela", "run", "build" ]
publicDir = "artifacts/erp-venezuela/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22002"
BASE_PATH = "/"
